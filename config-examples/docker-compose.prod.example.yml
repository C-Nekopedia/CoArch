version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: coarch-postgres-prod
    environment:
      POSTGRES_DB: coarch
      POSTGRES_USER: coarch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coarch"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coarch-network
    # 生产环境建议配置资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: coarch-redis-prod
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coarch-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # 后端服务
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: coarch-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 3000
      # 生产环境推荐配置
      NODE_OPTIONS: --max-old-space-size=512
      LOG_LEVEL: info
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - uploads_volume_prod:/app/uploads
      - ./logs/backend:/app/logs
    restart: unless-stopped
    networks:
      - coarch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 生产环境建议配置多个实例和负载均衡
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # 前端服务
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_ENV: production
    container_name: coarch-frontend-prod
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - coarch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: coarch-nginx-prod
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites-enabled:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    networks:
      - coarch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  # 监控服务（可选）
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: coarch-prometheus-prod
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data_prod:/prometheus
  #   ports:
  #     - "9090:9090"
  #   restart: unless-stopped
  #   networks:
  #     - coarch-network
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--web.console.libraries=/etc/prometheus/console_libraries'
  #     - '--web.console.templates=/etc/prometheus/consoles'
  #     - '--storage.tsdb.retention.time=30d'
  #   profiles:
  #     - monitoring

  # Grafana仪表板（可选）
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: coarch-grafana-prod
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
  #   volumes:
  #     - grafana_data_prod:/var/lib/grafana
  #     - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
  #     - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
  #   ports:
  #     - "3001:3000"
  #   restart: unless-stopped
  #   networks:
  #     - coarch-network
  #   depends_on:
  #     - prometheus
  #   profiles:
  #     - monitoring

networks:
  coarch-network:
    driver: bridge
    # 生产环境建议使用自定义网络配置
    ipam:
      config:
        - subnet: 172.20.0.0/16
    # 启用网络加密
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    # 限制网络访问
    internal: false

volumes:
  postgres_data_prod:
    name: coarch-postgres-data-prod
    # 生产环境建议使用外部卷
    # external: true
  redis_data_prod:
    name: coarch-redis-data-prod
  uploads_volume_prod:
    name: coarch-uploads-prod
  # prometheus_data_prod:
  #   name: coarch-prometheus-data-prod
  # grafana_data_prod:
  #   name: coarch-grafana-data-prod

# 生产环境建议配置
# 1. 使用外部卷存储数据
# 2. 配置资源限制防止资源耗尽
# 3. 启用健康检查确保服务可用性
# 4. 配置日志轮转和监控
# 5. 定期备份数据库卷